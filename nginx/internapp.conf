# Nginx configuration for CDP Intern Portal
# Deploy to: /etc/nginx/sites-available/internapp
#
# Enable:
#   ln -s /etc/nginx/sites-available/internapp /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Then get TLS cert:
#   certbot --nginx -d intern.cyberdefendersprogram.com

upstream internapp {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name intern.cyberdefendersprogram.com;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name intern.cyberdefendersprogram.com;

    # SSL certificates (managed by Certbot)
    # ssl_certificate /etc/letsencrypt/live/intern.cyberdefendersprogram.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/intern.cyberdefendersprogram.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging (separate from classapp logs)
    access_log /var/log/nginx/internapp_access.log;
    error_log  /var/log/nginx/internapp_error.log;

    # Upload limit (resume uploads, deliverable links)
    client_max_body_size 10M;

    # Main proxy
    location / {
        proxy_pass http://internapp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check (suppress access logs for monitoring)
    location /health {
        proxy_pass http://internapp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Static files served directly by nginx for performance
    location /static/ {
        alias /opt/internapp/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
