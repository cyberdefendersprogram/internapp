name: Update prod .env

on:
  workflow_dispatch:
    inputs:
      key:
        description: "Env var name"
        required: true
      value:
        description: "Env var value"
        required: true

jobs:
  update-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set env var on droplet and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/internapp
            # Remove existing line if present, then append new value
            sed -i '/^${{ github.event.inputs.key }}=/d' .env
            echo '${{ github.event.inputs.key }}=${{ github.event.inputs.value }}' >> .env
            echo "Updated ${{ github.event.inputs.key }}"
            docker compose up -d
