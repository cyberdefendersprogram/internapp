# Local development — hot reload, mounts source, uses .env directly
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build

services:
  app:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data:/var/lib/internapp
    environment:
      - ENV=development
      - SQLITE_PATH=data/app.db
      - LOG_LEVEL=DEBUG
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
